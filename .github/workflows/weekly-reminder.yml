name: "Annam - Weekly Meal Plan"

on:
  schedule:
    - cron: '0 3 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate plan and send email
        run: node annam-action.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_A: ${{ secrets.EMAIL_A }}
